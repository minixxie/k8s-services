ollama:
  image:
    repository: ollama/ollama
    pullPolicy: IfNotPresent
    tag: "0.18.0"
  runtimeClassName: "nvidia"  # to use gpu
  persistentVolume:
    enabled: false
    # enabled: true
    # accessModes:
    #   - ReadWriteOnce
    # size: 50Gi
    # storageClass: ""  # Use default storage class, or specify your storage class
  volumes:
    - name: ollama-models
      hostPath:
        path: /datascience-models/ollama
        type: DirectoryOrCreate
  volumeMounts:
    - name: ollama-models
      mountPath: /root/.ollama
  ollama:
    # Move the default ollama-data volume mount away so we can use /root/.ollama for hostPath
    mountPath: "/tmp/ollama-unused"
    gpu:
      # enable gpu if your k8s containerd/docker has gpu support
      enabled: true
    # Models are stored on hostPath /datascience-models/ollama and mounted to /root/.ollama
    # No automatic pull needed - models persist on the host
    models:
      pull: []
        #- deepseek-r1:1.5b
        #- deepseek-r1:7b
        #- deepseek-r1:8b
        #- deepseek-r1:14b
        #- deepseek-r1:32b
        #- deepseek-v3
        #- nezahatkorkmaz/deepseek-v3:latest
        #- ishumilin/deepseek-r1-coder-tools:14b
        #- MFDoom/deepseek-r1-tool-calling:14b
        #- llama3.2:3b
        #- llama3.1
        #- llava  # for image recognition
        #- codellama:7b
        #- qwen2.5-coder:7b
        ##- mistral
      run: []
        #- deepseek-r1:1.5b
        #- deepseek-r1:7b
        #- deepseek-r1:8b
        #- deepseek-r1:14b
        #- deepseek-r1:32b
        #- deepseek-v3
        #- nezahatkorkmaz/deepseek-v3:latest
        #- ishumilin/deepseek-r1-coder-tools:14b
        #- MFDoom/deepseek-r1-tool-calling:14b
        #- llama3.2:3b
        #- llama3.1
        #- llava  # for image recognition
        #- codellama:7b
        #- qwen2.5-coder:7b
        ##- mistral
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
    - host: ollama-api.local
      paths:
        - path: /
          pathType: Prefix
  extraEnv:
    - name: OLLAMA_ORIGINS
      value: "*"
    # Raise default server context window above 4096 to reduce prompt truncation.
    - name: OLLAMA_CONTEXT_LENGTH
      value: "32768"
