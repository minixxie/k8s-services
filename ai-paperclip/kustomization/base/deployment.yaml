apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-paperclip
  namespace: ai-paperclip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-paperclip
  template:
    metadata:
      labels:
        app: ai-paperclip
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: paperclip-home-perms
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /paperclip/.cache /paperclip/instances/default /paperclip/.config/opencode && chown -R 1000:1000 /paperclip
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: paperclip-home
              mountPath: /paperclip
      containers:
        - name: paperclip
          #image: minixxie/paperclip:a07237779bd5391a4683a754ed95249d57a49b2c
          image: minixxie/paperclip:7f893ac4ec9f700efaf902be8a57ce510c1c7092
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3100
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3100"
            - name: PAPERCLIP_ALLOWED_HOSTNAMES
              value: "ai-paperclip.local"
            - name: PAPERCLIP_PUBLIC_URL
              value: "http://ai-paperclip.local"
            - name: BETTER_AUTH_TRUSTED_ORIGINS
              value: "http://ai-paperclip.local,https://ai-paperclip.local,http://ai-paperclip.local:3100,https://ai-paperclip.local:3100"
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: paperclip-auth
                  key: better-auth-secret
            - name: OLLAMA_HOST
              value: "http://ollama.ai-ollama.svc.cluster.local:11434"
            - name: OPENCODE_DISABLE_PROJECT_CONFIG
              value: "true"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
              httpHeaders:
                - name: Host
                  value: "127.0.0.1"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
              httpHeaders:
                - name: Host
                  value: "127.0.0.1"
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: paperclip-home
              mountPath: /paperclip
            - name: opencode-config
              mountPath: /paperclip/.config/opencode/opencode.json
              subPath: opencode.json
              readOnly: true
      volumes:
        - name: paperclip-home
          emptyDir: {}
        - name: opencode-config
          configMap:
            name: opencode-config
            items:
              - key: opencode.json
                path: opencode.json