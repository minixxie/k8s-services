apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: ai-paperclip

namespace: ai-paperclip

resources:
  - namespace.yaml
  - opencode-config.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

secretGenerator:
  - name: paperclip-auth
    options:
      disableNameSuffixHash: true
    literals:
      # Rotate via overlay or `kubectl create secret` replacement; value is cluster-local
      - better-auth-secret=hello123
