apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-paperclip
  namespace: ai-paperclip
spec:
  rules:
    - host: ai-paperclip.local
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ai-paperclip
                port:
                  number: 3100
