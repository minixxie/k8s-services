openclaw:
  app-template:
    openclawVersion: "2026.3.13-1"  # container image version: ghcr.io/openclaw/openclaw:{openclawVersion}
    configMode: overwrite
    controllers:
      main:
        containers:
          main:
            env:
              OLLAMA_HOST: "http://ollama-api.local"
              OLLAMA_API_KEY: "ollama-local"
              GITHUB_COPILOT_TOKEN: "YOUR_GITHUB_COPILOT_TOKEN"
              NODE_OPTIONS: "--max-old-space-size=2048"
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              runAsUser: 1000
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                cpu: 2000m
                memory: 4Gi
    configMaps:
      config:
        data:
          openclaw.json: |
            {
              "gateway": {
                "port": 18789,
                "mode": "local",
                "trustedProxies": ["10.0.0.0/8"],
                "controlUi": {
                  "allowedOrigins": ["http://ai-openclaw.local", "https://ai-openclaw.local"]
                }
              },
              "browser": {
                "enabled": true,
                "defaultProfile": "default",
                "profiles": {
                  "default": {
                    "cdpUrl": "http://localhost:9222",
                    "color": "#4285F4"
                  }
                }
              },
              "models": {
                "providers": {
                  "ollama": {
                    "baseUrl": "http://ollama-api.local",
                    "apiKey": "ollama-local",
                    "api": "ollama",
                    "models": [
                      {
                        "id": "qwen3.5:9b",
                        "name": "qwen3.5:9b",
                        "contextWindow": 32768
                      }
                    ]
                  },
                  "github": {
                    "baseUrl": "https://api.githubcopilot.com",
                    "apiKey": "YOUR_GITHUB_COPILOT_TOKEN",
                    "api": "github-copilot",
                    "models": [
                      {
                        "id": "gpt-4o",
                        "name": "GitHub Copilot GPT-4o",
                        "contextWindow": 128000
                      },
                      {
                        "id": "gpt-4",
                        "name": "GitHub Copilot GPT-4",
                        "contextWindow": 8192
                      },
                      {
                        "id": "gpt-3.5-turbo",
                        "name": "GitHub Copilot GPT-3.5 Turbo",
                        "contextWindow": 16385
                      },
                      {
                        "id": "gpt-5-mini",
                        "name": "GitHub Copilot GPT-5 Mini",
                        "contextWindow": 256000
                      }
                    ]
                  }
                }
              },
              "agents": {
                "defaults": {
                  "workspace": "/home/node/.openclaw/workspace",
                  "model": {
                    "primary": "ollama/qwen3.5:9b"
                  },
                  "userTimezone": "UTC",
                  "timeoutSeconds": 600,
                  "maxConcurrent": 3
                },
                "list": [
                  {
                    "id": "main",
                    "default": true,
                    "identity": {
                      "name": "OpenClaw",
                      "emoji": "🦞"
                    }
                  }
                ]
              },
              "session": {
                "scope": "per-sender",
                "store": "/home/node/.openclaw/sessions",
                "reset": {
                  "mode": "idle",
                  "idleMinutes": 60
                }
              },
              "logging": {
                "level": "debug",
                "consoleLevel": "debug",
                "consoleStyle": "compact",
                "redactSensitive": "tools"
              },
              "tools": {
                "profile": "full",
                "web": {
                  "search": {
                    "enabled": false
                  },
                  "fetch": {
                    "enabled": true
                  }
                }
              }
            }
    ingress:
      main:
        enabled: true
        className: traefik
        annotations:
          traefik.ingress.kubernetes.io/router.tls: "true"
          cert-manager.io/cluster-issuer: "selfsigned-issuer"  # selfsigned-issuer / letsencrypt-prod
        tls:
          - secretName: ai-openclaw-tls
            hosts:
              - ai-openclaw.local
        hosts:
          - host: ai-openclaw.local
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
